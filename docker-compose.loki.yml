---
# Loki + Promtail + MinIO — Compose override
# LineSight Digital | linesightdigital.com
#
# Usage (with base stack):
#   docker compose -f docker-compose.yml -f docker-compose.loki.yml up -d
#
# Standalone (Loki only, no Prometheus/Grafana):
#   docker compose -f docker-compose.loki.yml up -d
#
# To use AWS S3 instead of MinIO:
#   1. Remove the minio service and minio_data volume
#   2. In loki.yml, replace the s3 block with your bucket/region/credentials
#   3. Remove the MINIO_* environment variables from this file

name: monitoring

services:

  # ── MinIO (S3-compatible local object storage) ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console UI
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO bucket init (runs once, creates loki bucket) ────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/loki;
        mc anonymous set none local/loki;
        echo 'MinIO bucket ready';
      "
    networks:
      - monitoring

  # ── Loki ─────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./config/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - monitoring
    depends_on:
      - minio-init

  # ── Promtail ──────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro                    # Host system logs
      - /var/lib/docker/containers:/var/lib/docker/containers:ro  # Docker logs
      - /run/log/journal:/run/log/journal:ro    # systemd journal
      - /etc/machine-id:/etc/machine-id:ro      # Required for journal scraping
      - promtail_positions:/tmp/positions        # Tracks read position per log file
    ports:
      - "9080:9080"   # Promtail UI + push endpoint
    networks:
      - monitoring
    depends_on:
      - loki

  # ── Extend Grafana with Loki datasource (no-op if Grafana not in base) ────
  grafana:
    volumes:
      - ./grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - ./grafana/provisioning/dashboards/logs.json:/etc/grafana/provisioning/dashboards/logs.json:ro

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  minio_data:
  loki_data:
  promtail_positions:

# ── Networks (must match base compose) ───────────────────────────────────────
networks:
  monitoring:
    driver: bridge
