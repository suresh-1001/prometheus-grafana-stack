# ─────────────────────────────────────────────────────────────────────────────
# datasources/loki.yml — Auto-provisions Loki as a Grafana datasource
# LineSight Digital | linesightdigital.com
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 5000
      derivedFields:
        # Auto-link trace IDs to Prometheus if present in logs
        - name: TraceID
          matcherRegex: 'trace_id=(\w+)'
          url: '$${__value.raw}'
