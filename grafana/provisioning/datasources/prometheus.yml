# ─────────────────────────────────────────────────────────────────────────────
# datasources/prometheus.yml — Auto-provisions Prometheus as a Grafana datasource
# LineSight Digital | linesightdigital.com
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST
